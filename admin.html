<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Cookie Fortune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Lora:ital,wght@1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lilac: #c8a8d8;
      --lilac-light: #ede0f7;
      --lilac-deep: #9b6baf;
      --lilac-pale: #f7f0fc;
      --cream: #fdfaff;
      --ink: #1c1525;
      --ink-soft: #7c6889;
      --red: #e05a5a;
      --red-pale: #fdf0f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      min-height: 100vh;
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 30%, rgba(200,168,216,0.15) 0%, transparent 65%);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(200,168,216,0.28);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(155,107,175,0.1);
      text-align: center;
    }

    .icon { font-size: 2.5rem; margin-bottom: 1rem; display: block; }

    h1 {
      font-family: 'Lora', serif;
      font-size: 1.6rem;
      font-style: italic;
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    p {
      font-size: 0.88rem;
      color: var(--ink-soft);
      line-height: 1.55;
      margin-bottom: 1.75rem;
    }

    .divider {
      height: 1px;
      background: rgba(200,168,216,0.3);
      margin: 1.5rem 0;
    }

    /* Password field */
    .field { margin-bottom: 1.25rem; text-align: left; }

    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      background: var(--lilac-pale);
      border: 1.5px solid transparent;
      border-radius: 14px;
      padding: 0.75rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--lilac);
      box-shadow: 0 0 0 3px rgba(200,168,216,0.2);
    }

    /* Stat */
    .stat {
      background: var(--lilac-pale);
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.88rem;
      color: var(--ink-soft);
    }

    .stat strong {
      display: block;
      font-size: 2rem;
      font-family: 'Lora', serif;
      font-style: italic;
      color: var(--lilac-deep);
      line-height: 1.1;
      margin-bottom: 0.2rem;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 100px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
      margin-bottom: 0.75rem;
    }

    .btn-primary {
      background: var(--lilac-deep);
      color: white;
      box-shadow: 0 4px 16px rgba(155,107,175,0.3);
    }

    .btn-primary:hover { background: #8a5a9e; transform: translateY(-1px); }

    .btn-danger {
      background: var(--red-pale);
      color: var(--red);
      border: 1.5px solid rgba(224,90,90,0.25);
    }

    .btn-danger:hover { background: var(--red); color: white; }

    .btn-ghost {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid rgba(200,168,216,0.4);
    }

    .btn-ghost:hover { border-color: var(--lilac-deep); color: var(--lilac-deep); }

    /* Status message */
    .status {
      font-size: 0.82rem;
      padding: 0.6rem 1rem;
      border-radius: 100px;
      margin-top: 0.75rem;
      display: none;
    }

    .status.success { background: #f0faf4; color: #3a8a5a; display: block; }
    .status.error { background: var(--red-pale); color: var(--red); display: block; }

    /* Locked state */
    #lockedView, #unlockedView { display: none; }
    #lockedView.active, #unlockedView.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🔐</span>
    <h1>Admin</h1>
    <p>Manage your Cookie Fortune event — view stats, reset for a new party.</p>

    <!-- Locked -->
    <div id="lockedView" class="active">
      <div class="field">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="Enter admin password" />
      </div>
      <button class="btn btn-primary" onclick="unlock()">Unlock</button>
      <div class="status" id="lockStatus"></div>
    </div>

    <!-- Unlocked -->
    <div id="unlockedView">
      <div class="stat">
        <strong id="cookieCount">—</strong>
        cookies in the gallery
      </div>

      <a href="gallery.html"><button class="btn btn-ghost">View gallery</button></a>

      <div class="divider"></div>

      <button class="btn btn-danger" onclick="confirmReset()">Reset all cookies</button>
      <div class="status" id="resetStatus"></div>
    </div>
  </div>

  <script>
    // ── Set your admin password here ──
    const ADMIN_PASSWORD = 'cookie28';

    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    // For delete you need the service role key (keep this secret, admin only page)
    const SUPABASE_SERVICE_KEY = 'YOUR_SUPABASE_SERVICE_ROLE_KEY';

    function unlock() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById('lockedView').classList.remove('active');
        document.getElementById('unlockedView').classList.add('active');
        loadStats();
      } else {
        const s = document.getElementById('lockStatus');
        s.textContent = 'Wrong password.';
        s.className = 'status error';
      }
    }

    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') unlock();
    });

    async function loadStats() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/cookies?select=id`, {
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Prefer': 'count=exact' }
        });
        const count = res.headers.get('content-range')?.split('/')[1] || '?';
        document.getElementById('cookieCount').textContent = count;
      } catch(e) { console.error(e); }
    }

    async function confirmReset() {
      if (!confirm('Delete ALL cookies from the gallery? This cannot be undone.')) return;
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/cookies?id=gt.0`, {
          method: 'DELETE',
          headers: {
            'apikey': SUPABASE_SERVICE_KEY,
            'Authorization': `Bearer ${SUPABASE_SERVICE_KEY}`
          }
        });
        const s = document.getElementById('resetStatus');
        s.textContent = '✓ All cookies cleared. Ready for the next party!';
        s.className = 'status success';
        document.getElementById('cookieCount').textContent = '0';
      } catch(e) {
        const s = document.getElementById('resetStatus');
        s.textContent = 'Something went wrong. Check your service key.';
        s.className = 'status error';
      }
    }
  </script>
</body>
</html>
