<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Fortune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&family=Lora:ital,wght@0,400;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    /* (UNCHANGED — your full CSS stays exactly the same) */
  </style>
</head>

<body>

  <!-- (UNCHANGED HTML BODY — everything stays the same up to script) -->

  <script>
    const FORTUNES = [
      "The sweetest things take the most unexpected shapes.",
      "Something beautiful is already on its way to you.",
      "You have the kind of warmth people remember for years.",
      "Today you made something that did not exist before. That matters.",
      "The people around you feel lucky, even when they forget to say it.",
      "You are allowed to take up space and be joyful in it.",
      "There is a version of this day you will tell stories about.",
      "Your instincts are better than you give them credit for.",
      "The best things in your life were never planned.",
      "You bring a specific kind of light that no one else does.",
      "Rest is not the opposite of beautiful things — it makes them possible.",
      "You are in the middle of a good chapter, even now.",
      "You have good taste. Trust it more.",
      "Your presence here changed the day for someone.",
      "Joy doesn't need a reason. You qualify.",
    ];

    const SUPABASE_URL = 'https://cedfnjikeywicybdzrws.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNlZGZuamlrZXl3aWN5YmR6cndzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTQ3MTUsImV4cCI6MjA5MDg5MDcxNX0.kgC19HZCtVMegbOuWNUEKmp_eOGtDwvadkuvO8buzZ4';

    let photoDataUrl = null;
    <input id="photoInput" type="file">
    document.getElementById('photoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (ev) => {
        photoDataUrl = ev.target.result;
        document.getElementById('photoPreview').src = photoDataUrl;
        document.getElementById('photoPreview').style.display = 'block';
        document.getElementById('uploadPlaceholder').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    function compressImage(dataUrl, maxWidth = 800) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxWidth / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.src = dataUrl;
      });
    }

    async function submitCookie() {
      const creatorName = document.getElementById('creatorName').value.trim();
      const name = document.getElementById('cookieName').value.trim();
      const desc = document.getElementById('cookieDesc').value.trim();

      if (!creatorName || !name || !photoDataUrl) {
        alert("Missing fields or photo");
        return;
      }

      const fortune = FORTUNES[Math.floor(Math.random() * FORTUNES.length)];

      document.getElementById('suspenseScreen').classList.add('active');

      try {
        const compressedPhoto = await compressImage(photoDataUrl);

        const res = await fetch(`${SUPABASE_URL}/rest/v1/fortune-cookies`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({
            creator_name: creatorName,
            name,
            description: desc || null,
            photo_url: compressedPhoto,
            cookies: fortune
          })
        });

        const text = await res.text();
        console.log("UPLOAD STATUS:", res.status);
        console.log("UPLOAD RESPONSE:", text);

      } catch (e) {
        console.error("UPLOAD ERROR:", e);
      }

      await new Promise(r => setTimeout(r, 1900));

      document.getElementById('suspenseScreen').classList.remove('active');
      document.getElementById('fortuneText').textContent = fortune;
      document.getElementById('fortuneOverlay').classList.add('active');

      setTimeout(() => {
        document.getElementById('cookieScene').classList.add('broken');
      }, 450);
    }

    function closeFortune() {
      document.getElementById('fortuneOverlay').classList.remove('active');
      document.getElementById('cookieScene').classList.remove('broken');
      window.location.href = 'gallery.html';
    }
  </script>
  <script src="./script.js"></script>
</body>
</html>
